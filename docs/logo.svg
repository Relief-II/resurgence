<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160" role="img" aria-label="Resurgence — Stellar Disaster Relief Platform">
  <defs>
    <!-- Night-to-dawn background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1226"/>
      <stop offset="55%" stop-color="#0d1b39"/>
      <stop offset="100%" stop-color="#11254b"/>
    </linearGradient>
    <!-- Warm dawn glow rising behind the mark -->
    <radialGradient id="dawn" cx="50%" cy="92%" r="70%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="38%" stop-color="#fb7185" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>
    <!-- Phoenix wings: cyan rising into gold -->
    <linearGradient id="wing" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="55%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <!-- Stellar star -->
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <!-- Relief heart core -->
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Backdrop -->
  <rect width="520" height="160" rx="18" fill="url(#bg)"/>
  <ellipse cx="84" cy="150" rx="110" ry="70" fill="url(#dawn)"/>

  <!-- ===== Icon: phoenix-star rising from the network (center x = 84) ===== -->

  <!-- Dawn horizon arc -->
  <path d="M 30 116 A 54 54 0 0 1 138 116" fill="none" stroke="#fbbf24" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- Phoenix wings (left filled, right mirrored) -->
  <g filter="url(#glow)">
    <path d="M84 112 C 72 100 60 96 50 82 C 44 73 43 62 49 52 C 58 62 68 68 76 82 C 81 91 83 101 84 112 Z"
          fill="url(#wing)" opacity="0.96"/>
    <path d="M84 112 C 72 100 60 96 50 82 C 44 73 43 62 49 52 C 58 62 68 68 76 82 C 81 91 83 101 84 112 Z"
          fill="url(#wing)" opacity="0.96" transform="translate(168,0) scale(-1,1)"/>
    <!-- Inner feather strokes for lift -->
    <path d="M84 110 C 74 98 66 92 60 80" fill="none" stroke="#e0f7ff" stroke-opacity="0.30" stroke-width="1.3"/>
    <path d="M84 110 C 94 98 102 92 108 80" fill="none" stroke="#e0f7ff" stroke-opacity="0.30" stroke-width="1.3"/>
  </g>

  <!-- Rising body / flame -->
  <path d="M84 116 C 80 100 80 84 84 64 C 88 84 88 100 84 116 Z" fill="url(#wing)" opacity="0.9"/>

  <!-- Relief heart core -->
  <path d="M84 96 C 84 96 75 88 75 82 C 75 78 80 76 84 81 C 88 76 93 78 93 82 C 93 88 84 96 84 96 Z"
        fill="url(#heart)" filter="url(#soft)" opacity="0.95"/>

  <!-- Stellar star at the apex -->
  <polygon points="84,30 88.4,47 105,47 91,57 96,74 84,63 72,74 77,57 63,47 79.6,47"
           fill="url(#star)" filter="url(#soft)"/>

  <!-- Support network (blockchain community) beneath -->
  <g stroke="#38bdf8" stroke-opacity="0.30" stroke-width="1">
    <line x1="54" y1="128" x2="69" y2="134"/>
    <line x1="69" y1="134" x2="84" y2="136"/>
    <line x1="84" y1="136" x2="99" y2="134"/>
    <line x1="99" y1="134" x2="114" y2="128"/>
  </g>
  <g fill="#38bdf8">
    <circle cx="54" cy="128" r="2.6" opacity="0.65"/>
    <circle cx="69" cy="134" r="2.1" opacity="0.5"/>
    <circle cx="84" cy="136" r="2.8" opacity="0.7"/>
    <circle cx="99" cy="134" r="2.1" opacity="0.5"/>
    <circle cx="114" cy="128" r="2.6" opacity="0.65"/>
  </g>

  <!-- ===== Wordmark ===== -->
  <text x="160" y="72" font-family="'Segoe UI', Arial, sans-serif" font-size="37" font-weight="700" letter-spacing="1.5" fill="url(#title)" filter="url(#glow)">RESURGENCE</text>
  <line x1="161" y1="84" x2="492" y2="84" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1"/>
  <text x="161" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="12.5" font-weight="400" letter-spacing="2.4" fill="#7dd3fc" opacity="0.92">STELLAR DISASTER RELIEF PLATFORM</text>
  <text x="161" y="125" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748b" letter-spacing="0.4">Rebuilding lives — blockchain-powered emergency aid</text>

  <!-- Tech badges -->
  <rect x="161" y="135" width="62" height="17" rx="4.5" fill="#0ea5e9" fill-opacity="0.20"/>
  <text x="171" y="147" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" font-weight="600" fill="#7dd3fc" letter-spacing="1">STELLAR</text>
  <rect x="229" y="135" width="66" height="17" rx="4.5" fill="#a855f7" fill-opacity="0.22"/>
  <text x="239" y="147" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" font-weight="600" fill="#d8b4fe" letter-spacing="1">SOROBAN</text>
  <rect x="301" y="135" width="84" height="17" rx="4.5" fill="#22c55e" fill-opacity="0.20"/>
  <text x="311" y="147" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" font-weight="600" fill="#86efac" letter-spacing="1">OPEN SOURCE</text>
</svg>
